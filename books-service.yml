server:
  port: 8110

spring:
  application:
    name: books-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: bamboDevSpringSecurityCloud
    password: bamboDevSpringSecurityCloud
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8106/eureka/
    register-with-eureka: true
    fetch-registry: true
